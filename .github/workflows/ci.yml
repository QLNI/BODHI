name: BODHI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install numpy pillow torch sentencepiece cryptography requests --quiet

      - name: Run eval harness
        run: python eval_harness.py

      - name: Run claim verification
        run: python verify.py
